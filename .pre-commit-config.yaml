minimum_pre_commit_version: "3.0.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt (format check)
        entry: pnpm run fmt:check
        language: system
        pass_filenames: false
        files: \.(ts|tsx|js|jsx|json|css|md)$

      - id: oxlint
        name: oxlint
        entry: pnpm run lint
        language: system
        pass_filenames: false
        files: \.(ts|tsx|js|jsx)$

      - id: typecheck
        name: tsc typecheck
        entry: pnpm run typecheck
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$

      - id: test
        name: vitest
        entry: pnpm run test
        language: system
        pass_filenames: false
        files: \.(ts|tsx)$
